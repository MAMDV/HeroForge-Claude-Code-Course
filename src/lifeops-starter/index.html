<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LifeOps Command Center</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="container header-content">
        <h1 class="logo">LifeOps Command Center</h1>
        <nav class="nav">
          <button class="nav-btn active" data-view="dashboard">Dashboard</button>
          <button class="nav-btn" data-view="contacts">Contacts</button>
          <button class="nav-btn" data-view="tasks">Tasks</button>
          <button class="nav-btn" data-view="notes">Notes</button>
        </nav>
      </div>
    </header>

    <main class="main">
      <div class="container">

        <!-- DASHBOARD VIEW -->
        <section id="dashboard" class="view active">
          <h2>Dashboard</h2>
          <div class="stats-row">
            <div class="stat-card">
              <span class="stat-value" id="contacts-count">0</span>
              <span class="stat-label">Contacts</span>
            </div>
            <div class="stat-card">
              <span class="stat-value" id="tasks-count">0</span>
              <span class="stat-label">Tasks</span>
            </div>
            <div class="stat-card">
              <span class="stat-value" id="notes-count">0</span>
              <span class="stat-label">Notes</span>
            </div>
          </div>
        </section>

        <!-- SESSION 3: Add contacts section here -->
        <section id="contacts" class="view">
          <h2>Contacts</h2>
          <p class="placeholder-text">Contacts will be loaded from seed data in Session 3.</p>
        </section>

        <!-- SESSION 3: Add tasks section here -->
        <section id="tasks" class="view">
          <h2>Tasks</h2>
          <p class="placeholder-text">Tasks will be loaded from seed data in Session 3.</p>
        </section>

        <!-- SESSION 3: Add notes section here -->
        <section id="notes" class="view">
          <h2>Notes</h2>
          <p class="placeholder-text">Notes will be loaded from seed data in Session 3.</p>
        </section>

      </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="container">
        <p>LifeOps Command Center &mdash; Built with Claude Code</p>
      </div>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
